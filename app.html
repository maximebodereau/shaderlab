<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ShaderLab</title>
<style>
  :root{
    --bg:#0a0b0d; --panel:#131519; --panel2:#1a1d22; --line:#262a31;
    --txt:#e7e9ec; --muted:#8a9099; --accent:#3ee07f; --accent2:#2bb968;
    --danger:#ff5d5d; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--txt);font-size:13px;line-height:1.5;
    display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{display:flex;align-items:center;gap:14px;padding:10px 16px;
    border-bottom:1px solid var(--line);background:var(--panel);flex-shrink:0}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px}
  header h1 b{color:var(--accent)}
  .spacer{flex:1}
  button{font-family:inherit;font-size:12px;color:var(--txt);background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:7px 12px;cursor:pointer;
    transition:.12s;display:inline-flex;align-items:center;gap:6px}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);color:#06140b;border-color:var(--accent);font-weight:600}
  button.primary:hover{background:var(--accent2);color:#06140b}
  button.ghost{background:transparent}
  select{font-family:inherit;font-size:11px;color:var(--txt);background:#0c0d10;
    border:1px solid var(--line);border-radius:6px;padding:4px 6px;cursor:pointer}
  main{display:flex;flex:1;min-height:0}
  .stage{flex:1;position:relative;min-width:0;overflow:hidden;
    background:linear-gradient(45deg,#0e0f12 25%,transparent 25%) -10px 0,
      linear-gradient(-45deg,#0e0f12 25%,transparent 25%) -10px 0,
      linear-gradient(45deg,transparent 75%,#0e0f12 75%),
      linear-gradient(-45deg,transparent 75%,#0e0f12 75%);
    background-size:20px 20px;background-color:#070809}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair}
  .stage.solid-black{background:#000}
  .stage.solid-white{background:#fff}
  .handles{position:absolute;inset:0;pointer-events:none;z-index:4}
  .handle{position:absolute;width:22px;height:22px;margin:-11px 0 0 -11px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.5);cursor:grab;pointer-events:auto;touch-action:none}
  .handle:hover{border-color:var(--accent)}
  .handle.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent),0 2px 10px rgba(0,0,0,.55)}
  .pt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
  .pt-row{display:flex;align-items:center;gap:7px;padding:3px 5px;border-radius:7px;cursor:pointer;border:1px solid transparent}
  .pt-row.sel{border-color:var(--line);background:rgba(255,255,255,.03)}
  .pt-row .idx{width:15px;height:15px;border-radius:50%;border:1px solid var(--line);flex-shrink:0}
  .pt-row input[type=color]{width:30px;height:24px;padding:0;border:none;background:none;cursor:pointer;flex-shrink:0}
  .pt-row input[type=range]{flex:1;min-width:0}
  .pt-row .rm{cursor:pointer;color:var(--muted);padding:1px 6px;border-radius:5px;flex-shrink:0}
  .pt-row .rm:hover{color:#ff6b6b;background:rgba(255,107,107,.12)}
  .addpt{margin-bottom:10px}
  .bg-switch{position:absolute;bottom:12px;right:12px;display:flex;gap:3px;background:rgba(20,22,26,.65);backdrop-filter:blur(6px);padding:4px;border-radius:9px;border:1px solid var(--line);z-index:6}
  .bg-switch button{padding:3px 7px;font-size:12px;line-height:1;border-radius:5px;background:transparent;border:1px solid transparent;color:var(--muted);cursor:pointer}
  .bg-switch button:hover{color:var(--txt)}
  .bg-switch button.on{border-color:var(--accent);color:var(--accent)}
  aside{width:340px;flex-shrink:0;border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
  .section{padding:14px 16px;border-bottom:1px solid var(--line)}
  .section h2{margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
  .lib-cat{margin-bottom:10px}
  .lib-cat .ct{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;opacity:.8}
  .library{display:flex;flex-wrap:wrap;gap:5px}
  .chip{font-size:11px;padding:5px 9px;border-radius:18px;background:var(--panel2);border:1px solid var(--line);cursor:pointer;transition:.12s;white-space:nowrap}
  .chip:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
  .chip .mo{color:var(--accent);font-size:9px;margin-left:2px}
  .lib-scroll{max-height:240px;overflow-y:auto;padding-right:4px}
  .stack-wrap{flex:1;overflow-y:auto}
  .stack-empty{color:var(--muted);font-style:italic;padding:8px 0}
  .layer{background:var(--panel2);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden}
  .layer.selected{border-color:var(--accent)}
  .layer.disabled .lname{opacity:.4}
  .lhead{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer}
  .lhead .eye{font-size:14px;width:18px;text-align:center;opacity:.85}
  .lhead .lname{flex:1;font-weight:500}
  .lhead .mo{font-size:10px;color:var(--accent);margin-left:4px}
  .lhead .ord{display:flex;flex-direction:column;gap:1px}
  .lhead .ord button{padding:1px 5px;font-size:9px;line-height:1.1;border-radius:4px}
  .lhead .del{color:var(--muted);padding:3px 6px;font-size:13px;background:transparent;border:none}
  .lhead .del:hover{color:var(--danger)}
  .lbody{padding:8px 12px 12px;border-top:1px solid var(--line)}
  .blendrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .blendrow select{flex:1}
  .ctrl{margin:9px 0}
  .ctrl label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
  .ctrl label span{color:var(--accent);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:3px;background:var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--panel)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--panel)}
  input[type=color]{width:42px;height:24px;padding:0;border:1px solid var(--line);border-radius:6px;background:none;cursor:pointer}
  .ctrl.colorctrl label{margin-bottom:0;align-items:center}
  .code-toggle{margin-top:8px;font-size:10.5px;color:var(--muted);cursor:pointer;user-select:none}
  .code-toggle:hover{color:var(--accent)}
  textarea{width:100%;min-height:160px;background:#0c0d10;color:#cfd3da;border:1px solid var(--line);border-radius:8px;
    font-family:"SF Mono",Menlo,Consolas,monospace;font-size:11px;line-height:1.5;padding:8px;resize:vertical;margin-top:6px}
  .err{color:var(--danger);font-size:10.5px;white-space:pre-wrap;margin-top:4px}
  .row{display:flex;gap:6px;margin-top:6px}
  .row button{flex:1;justify-content:center}
  input[type=file]{display:none}
  .topbtns{display:flex;gap:8px;flex-wrap:wrap}
  @media(max-width:760px){ main{flex-direction:column} aside{width:100%;border-left:none;border-top:1px solid var(--line);max-height:48vh} .stage{min-height:240px} }
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100}
  .modal.open{display:flex}
  .modal .box{width:min(840px,93vw);max-height:88vh;background:var(--panel);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
  .modal .top{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .modal .top h3{margin:0;font-size:14px}
  .tabs{display:flex;gap:4px;flex:1;flex-wrap:wrap}
  .tab{font-size:11.5px;padding:6px 11px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);cursor:pointer}
  .tab.active{border-color:var(--accent);color:var(--accent)}
  .modal .x{background:transparent;border:none;font-size:17px;color:var(--muted);cursor:pointer}
  .modal .mbody{padding:14px 16px;overflow:auto}
  .modal .desc{color:var(--muted);font-size:11.5px;margin:0 0 8px}
  .modal textarea{min-height:330px;font-size:11px}
  .modal .acts{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line)}
  .src-types{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
  .src-types .chip.on{border-color:var(--accent);color:var(--accent);background:rgba(62,224,127,.08)}
  .src-colors{display:flex;gap:10px;margin:8px 0}
  .src-colors .sw{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted)}
  .src-note{font-size:11px;color:var(--muted);margin:6px 0}
  .ratios{display:flex;gap:5px;margin-top:8px}
  .ratios .chip.on{border-color:var(--accent);color:var(--accent)}
  .lockbar{display:none;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(62,224,127,.08);border:1px solid var(--accent);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:12px}
  .lockbar input{flex:1;min-width:120px;background:#0c0e12;border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:5px 8px;font-family:inherit}
  .lockbar a{color:var(--accent);text-decoration:none;white-space:nowrap;font-weight:600}
  body.locked #mCode{filter:blur(5px)}
</style>
</head>
<body>
<header>
  <h1>Shader<b>Lab</b></h1>
  <div class="spacer"></div>
  <div class="topbtns">
    <button id="btnUpload">⬆ Upload image</button>
    <button id="btnPlay" class="ghost">⏸ Pause</button>
    <button id="btnExport">⬇ PNG</button>
    <button id="btnImport" class="ghost">⬆ Import preset</button>
    <button id="btnCode" class="primary">⧉ Export code</button>
  </div>
  <input type="file" id="file" accept="image/*"/>
  <input type="file" id="jsonfile" accept="application/json,.json" style="display:none"/>
</header>
<main>
  <div class="stage" id="stage">
    <canvas id="gl"></canvas>
    <div class="handles" id="handles"></div>
    <div class="bg-switch" id="bgSwitch">
      <button data-bg="checker" class="on" title="Checkerboard (shows transparency)">▦</button>
      <button data-bg="black" title="Black background">⬛</button>
      <button data-bg="white" title="White background">⬜</button>
    </div>
  </div>
  <aside>
    <div class="section">
      <h2>Background source</h2>
      <div class="src-types" id="srcTypes"></div>
      <div id="srcControls"></div>
    </div>
    <div class="section">
      <h2>Effect library</h2>
      <div class="lib-scroll" id="library"></div>
    </div>
    <div class="section stack-wrap">
      <h2>Effect stack <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(top → bottom)</span></h2>
      <div id="stack"></div>
    </div>
  </aside>
</main>

<div class="modal" id="modal"><div class="box">
  <div class="top"><h3>Export</h3>
    <div class="tabs">
      <div class="tab active" data-t="html">Standalone HTML</div>
      <div class="tab" data-t="js">Vanilla JS</div>
      <div class="tab" data-t="vue">Vue</div>
      <div class="tab" data-t="react">React</div>
      <div class="tab" data-t="svelte">Svelte</div>
      <div class="tab" data-t="glsl">GLSL</div>
      <div class="tab" data-t="json">JSON</div>
      <div class="tab" data-t="svgbg">SVG BG</div>
    </div>
    <button class="x" id="mClose">✕</button>
  </div>
  <div class="mbody"><p class="desc" id="mDesc"></p>
    <div class="lockbar" id="lockbar"><span>🔒 Code export is a one-time, pay-what-you-want unlock.</span><input id="licKey" placeholder="License key"/><button id="licUnlock" class="primary">Unlock</button><a id="licBuy" href="#" target="_blank" rel="noopener">Get a license →</a></div>
    <textarea id="mCode" readonly spellcheck="false"></textarea></div>
  <div class="acts"><button class="primary" id="mCopy">Copy</button><button id="mDownload">Download file</button></div>
</div></div>

<script type="text/plain" id="rt">
const VERT=`#version 300 es
in vec2 a_pos; out vec2 v_uv;
void main(){ v_uv=a_pos*0.5+0.5; gl_Position=vec4(a_pos,0.0,1.0); }`;
const PASS=`#version 300 es
precision highp float; in vec2 v_uv; out vec4 o; uniform sampler2D u_tex;
void main(){ o=texture(u_tex,v_uv); }`;
function _fragFor(e){
  const decl=Object.keys(e.types||{}).map(n=> e.types[n]==='color'?`uniform vec4 ${n};`:`uniform float ${n};`).join('\n');
  return `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 fragColor;
uniform sampler2D u_tex; uniform float u_time; uniform vec2 u_res; uniform vec2 u_mouse; uniform float u_click;
uniform float u_opacity; uniform int u_blendMode;
${decl}
vec3 _blend(vec3 b,vec3 s,int m){
 if(m==1)return min(b+s,1.0);
 if(m==2)return b*s;
 if(m==3)return 1.0-(1.0-b)*(1.0-s);
 if(m==4)return mix(2.0*b*s,1.0-2.0*(1.0-b)*(1.0-s),step(vec3(0.5),b));
 if(m==5)return abs(b-s);
 if(m==6)return max(b,s);
 if(m==7)return min(b,s);
 if(m==8)return max(b-s,0.0);
 return s;}
${e.body}
void main(){ vec4 base=texture(u_tex,v_uv); vec4 fx=apply(v_uv);
 vec3 col=_blend(base.rgb,fx.rgb,u_blendMode); col=mix(base.rgb,col,u_opacity);
 fragColor=vec4(col,base.a); }`;
}
const BASE_HEAD=`#version 300 es
precision highp float; in vec2 v_uv; out vec4 o;
uniform float u_time; uniform vec2 u_res; uniform vec2 u_mouse; uniform float u_click; uniform float u_imgAspect;
uniform int u_n; uniform vec2 u_pts[16]; uniform vec4 u_cols[16]; uniform float sharpness; uniform float drift; uniform float speed; uniform sampler2D u_src;
`;
const BASE_MAIN={
 image:`void main(){ float ca=u_res.x/u_res.y; vec2 s=(ca>u_imgAspect)?vec2(1.0,u_imgAspect/ca):vec2(ca/u_imgAspect,1.0); vec2 uv=(v_uv-0.5)*s+0.5; vec2 off=(u_mouse-0.5)*0.03*(1.0+u_click); o=texture(u_src, uv+off); }`,
 color:`void main(){ o=u_cols[0]; }`,
 mesh:`void main(){ vec4 acc=vec4(0.0); float wsum=0.0; for(int i=0;i<16;i++){ if(i>=u_n) break; vec2 p=u_pts[i]+vec2(sin(u_time*speed+float(i)*1.7),cos(u_time*speed*0.9+float(i)*2.3))*drift; float d=distance(v_uv,p); float w=1.0/pow(d+0.0015, sharpness); acc+=u_cols[i]*w; wsum+=w; } o=acc/max(wsum,1e-4); }`
};
class ShaderStack{
  constructor(canvas,opts={}){
    this.canvas=canvas; const g=this.gl=canvas.getContext('webgl2',{preserveDrawingBuffer:true,premultipliedAlpha:false});
    if(!g) throw new Error('WebGL2 required');
    this.mouse=[0.5,0.5]; this.click=0; this.playing=opts.autoplay!==false; this.t0=performance.now(); this._alive=true;
    this.w=canvas.width||512; this.h=canvas.height||512; this.src=null; this.fbos=[null,null]; this.baseF=null; this.responsive=!!opts.responsive; this.imgAspect=1;
    this.vao=g.createVertexArray(); g.bindVertexArray(this.vao);
    const b=g.createBuffer(); g.bindBuffer(g.ARRAY_BUFFER,b);
    g.bufferData(g.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),g.STATIC_DRAW);
    g.enableVertexAttribArray(0); g.vertexAttribPointer(0,2,g.FLOAT,false,0,0);
    this.pass=this._prog(PASS);
    this.SRC=JSON.parse(JSON.stringify(PRESET.source||{type:'mesh',points:[{x:0.3,y:0.7,c:[0.1,0.1,0.45,1]},{x:0.7,y:0.3,c:[0.9,0.3,0.5,1]}],sharpness:3,drift:0,speed:0.4,imgAspect:1}));
    this.baseF=null; this.baseProgs={}; for(const k in BASE_MAIN){ this.baseProgs[k]=this._prog(BASE_HEAD+BASE_MAIN[k]); }
    this.effects=PRESET.effects.map(e=>({...e,params:Object.assign({},e.params),program:this._prog(_fragFor(e)),locs:{}}));
    if(this.responsive){ this._resize(); if(typeof ResizeObserver!=='undefined'){this._ro=new ResizeObserver(()=>this._resize());this._ro.observe(canvas);} this._onR=()=>this._resize(); window.addEventListener('resize',this._onR); if(opts.image) this.setImage(opts.image); }
    else if(this.SRC.type==='upload'){ if(opts.image) this.setImage(opts.image); else { this.w=canvas.width||820; this.h=canvas.height||820; this._fbos(); } }
    else { this._genSize(); }
    canvas.addEventListener('mousemove',ev=>{const r=canvas.getBoundingClientRect();this.mouse=[(ev.clientX-r.left)/r.width,1-(ev.clientY-r.top)/r.height];});
    canvas.addEventListener('mousedown',()=>{this.click=1;}); window.addEventListener('mouseup',()=>{this.click=0;});
    canvas.addEventListener('touchmove',ev=>{if(ev.touches[0]){const r=canvas.getBoundingClientRect();this.mouse=[(ev.touches[0].clientX-r.left)/r.width,1-(ev.touches[0].clientY-r.top)/r.height];}},{passive:true});
    canvas.addEventListener('touchstart',()=>{this.click=1;},{passive:true}); window.addEventListener('touchend',()=>{this.click=0;});
    this._tick=this._tick.bind(this); requestAnimationFrame(this._tick);
  }
  _sh(t,s){const g=this.gl,sh=g.createShader(t);g.shaderSource(sh,s);g.compileShader(sh);if(!g.getShaderParameter(sh,g.COMPILE_STATUS))throw new Error(g.getShaderInfoLog(sh));return sh;}
  _prog(f){const g=this.gl,p=g.createProgram();g.attachShader(p,this._sh(g.VERTEX_SHADER,VERT));g.attachShader(p,this._sh(g.FRAGMENT_SHADER,f));g.bindAttribLocation(p,0,'a_pos');g.linkProgram(p);if(!g.getProgramParameter(p,g.LINK_STATUS))throw new Error(g.getProgramInfoLog(p));return p;}
  _loc(e,n){if(!(n in e.locs))e.locs[n]=this.gl.getUniformLocation(e.program,n);return e.locs[n];}
  _fbo(w,h){const g=this.gl,tex=g.createTexture();g.bindTexture(g.TEXTURE_2D,tex);g.texImage2D(g.TEXTURE_2D,0,g.RGBA8,w,h,0,g.RGBA,g.UNSIGNED_BYTE,null);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_MIN_FILTER,g.LINEAR);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_MAG_FILTER,g.LINEAR);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_WRAP_S,g.CLAMP_TO_EDGE);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_WRAP_T,g.CLAMP_TO_EDGE);const fb=g.createFramebuffer();g.bindFramebuffer(g.FRAMEBUFFER,fb);g.framebufferTexture2D(g.FRAMEBUFFER,g.COLOR_ATTACHMENT0,g.TEXTURE_2D,tex,0);return {fb,tex};}
  _fbos(){const g=this.gl;[this.fbos[0],this.fbos[1],this.baseF].forEach(f=>{if(f){g.deleteFramebuffer(f.fb);g.deleteTexture(f.tex);}});this.fbos=[this._fbo(this.w,this.h),this._fbo(this.w,this.h)];this.baseF=this._fbo(this.w,this.h);}
  _genSize(){this.w=this.canvas.width||900;this.h=this.canvas.height||600;this.canvas.width=this.w;this.canvas.height=this.h;this._fbos();}
  setSource(o){Object.assign(this.SRC,o);}
  setImage(src){const g=this.gl;const apply=(img)=>{const iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height;this.imgAspect=iw/ih;this.SRC.imgAspect=this.imgAspect;if(this.src)g.deleteTexture(this.src);this.src=g.createTexture();g.bindTexture(g.TEXTURE_2D,this.src);g.pixelStorei(g.UNPACK_FLIP_Y_WEBGL,true);g.texImage2D(g.TEXTURE_2D,0,g.RGBA,g.RGBA,g.UNSIGNED_BYTE,img);g.pixelStorei(g.UNPACK_FLIP_Y_WEBGL,false);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_MIN_FILTER,g.LINEAR);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_MAG_FILTER,g.LINEAR);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_WRAP_S,g.CLAMP_TO_EDGE);g.texParameteri(g.TEXTURE_2D,g.TEXTURE_WRAP_T,g.CLAMP_TO_EDGE);this.SRC.type='upload';if(!this.responsive){const max=1024;const sc=Math.min(1,max/Math.max(iw,ih));this.w=Math.round(iw*sc);this.h=Math.round(ih*sc);this.canvas.width=this.w;this.canvas.height=this.h;}this._fbos();};
    if(typeof src==='string'){const i=new Image();i.crossOrigin='anonymous';i.onload=()=>apply(i);i.src=src;} else apply(src);}
  setParam(i,n,v){this.effects[i].params[n]=v;} setOpacity(i,v){this.effects[i].opacity=v;} setBlend(i,m){this.effects[i].blend=m;} setEnabled(i,b){this.effects[i].enabled=b;}
  play(){this.playing=true;} pause(){this.playing=false;} toDataURL(t){this.render();return this.canvas.toDataURL(t||'image/png');}

   g.uniform1f(g.getUniformLocation(p,'u_time'),time);g.uniform2f(g.getUniformLocation(p,'u_res'),this.w,this.h);g.uniform2f(g.getUniformLocation(p,'u_mouse'),this.mouse[0],this.mouse[1]);g.uniform1f(g.getUniformLocation(p,'u_click'),this.click);
   const P=S.points||[];const n=Math.min(P.length,16);const pts=new Float32Array(32),cols=new Float32Array(64);for(let i=0;i<n;i++){pts[i*2]=P[i].x;pts[i*2+1]=P[i].y;const c=P[i].c;cols[i*4]=c[0];cols[i*4+1]=c[1];cols[i*4+2]=c[2];cols[i*4+3]=c[3]==null?1:c[3];}
   g.uniform1i(g.getUniformLocation(p,'u_n'),n);g.uniform2fv(g.getUniformLocation(p,'u_pts'),pts);g.uniform4fv(g.getUniformLocation(p,'u_cols'),cols);
   g.uniform1f(g.getUniformLocation(p,'sharpness'),S.sharpness==null?3:S.sharpness);g.uniform1f(g.getUniformLocation(p,'drift'),S.drift||0);g.uniform1f(g.getUniformLocation(p,'speed'),S.speed==null?0.4:S.speed);g.uniform1f(g.getUniformLocation(p,'u_imgAspect'),S.imgAspect||this.imgAspect||1);
   if(S.type==='upload'){g.activeTexture(g.TEXTURE0);g.bindTexture(g.TEXTURE_2D,this.src);g.uniform1i(g.getUniformLocation(p,'u_src'),0);}

  _resize(){if(!this.responsive)return;const dpr=typeof devicePixelRatio!=='undefined'?devicePixelRatio:1;const rect=this.canvas.getBoundingClientRect?this.canvas.getBoundingClientRect():{width:this.canvas.width||512,height:this.canvas.height||512};const w=Math.round(rect.width*dpr)||512,h=Math.round(rect.height*dpr)||512;if(w===this.w&&h===this.h&&this.baseF)return;this.w=w;this.h=h;this.canvas.width=w;this.canvas.height=h;this._fbos();}

`vec3 r2h(vec3 c){vec4 K=vec4(0.,-1./3.,2./3.,-1.);vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));float d=q.x-min(q.w,q.y);return vec3(abs(q.z+(q.w-q.y)/(6.*d+1e-10)),d/(q.x+1e-10),q.x);}

// ===== WebGL =====
const canvas=document.getElementById('gl');
const gl=canvas.getContext('webgl2',{preserveDrawingBuffer:true,premultipliedAlpha:false});
if(!gl){document.body.innerHTML="<p style='padding:20px'>WebGL2 not supported by this browser.</p>";}
function compile(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){const e=gl.getShaderInfoLog(sh);gl.deleteShader(sh);throw new Error(e);}return sh;}
function makeProgram(frag){const p=gl.createProgram();gl.attachShader(p,compile(gl.VERTEX_SHADER,VERT));gl.attachShader(p,compile(gl.FRAGMENT_SHADER,frag));gl.bindAttribLocation(p,0,'a_pos');gl.linkProgram(p);if(!gl.getProgramParameter(p,gl.LINK_STATUS))throw new Error(gl.getProgramInfoLog(p));return p;}
function buildFrag(params,body){
  const decl=params.map(p=>p.type==='color'?`uniform vec4 ${p.n};`:`uniform float ${p.n};`).join('\n');
  return `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 fragColor;
uniform sampler2D u_tex; uniform float u_time; uniform vec2 u_res; uniform vec2 u_mouse; uniform float u_click;
uniform float u_opacity; uniform int u_blendMode;
${decl}
vec3 _blend(vec3 b,vec3 s,int m){
 if(m==1)return min(b+s,1.0);
 if(m==2)return b*s;
 if(m==3)return 1.0-(1.0-b)*(1.0-s);
 if(m==4)return mix(2.0*b*s,1.0-2.0*(1.0-b)*(1.0-s),step(vec3(0.5),b));
 if(m==5)return abs(b-s);
 if(m==6)return max(b,s);
 if(m==7)return min(b,s);
 if(m==8)return max(b-s,0.0);
 return s;}
${body}
void main(){

 for(let i=0;i<n;i++){pts[i*2]=source.points[i].x;pts[i*2+1]=source.points[i].y;const c=source.points[i].c;cols[i*4]=c[0];cols[i*4+1]=c[1];cols[i*4+2]=c[2];cols[i*4+3]=c[3]==null?1:c[3];}

  gl.uniform1f(uloc(s,'u_time'),time);gl.uniform2f(uloc(s,'u_res'),texW,texH);gl.uniform2f(uloc(s,'u_mouse'),mouse[0],mouse[1]);gl.uniform1f(uloc(s,'u_click'),click);
  gl.uniform1f(uloc(s,'u_opacity'),s.opacity);gl.uniform1i(uloc(s,'u_blendMode'),s.blend);
